version: 0.2

env:
  variables:
    AWS_ACCOUNT_ID: "019256649767"
    AWS_DEFAULT_REGION: "us-east-1"
    REPO_URI_BACKEND: "019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-backend"
    REPO_URI_EMAIL: "019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-email"
    IMAGE_TAG: "latest"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Building backend..."
      - docker build -t $REPO_URI_BACKEND:$IMAGE_TAG ./backend
      - echo "Building email microservice..."
      - docker build -t $REPO_URI_EMAIL:$IMAGE_TAG ./email-microservice

  post_build:
    commands:
      - echo "Pushing to ECR..."
      - docker push $REPO_URI_BACKEND:$IMAGE_TAG
      - docker push $REPO_URI_EMAIL:$IMAGE_TAG
      - echo "Done!"

artifacts:
  files: '**/*'