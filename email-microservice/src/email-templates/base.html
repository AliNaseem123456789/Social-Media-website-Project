<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f5f7fb;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #ffffff;
    }
    .header {
      background-color: #4267B2;
      padding: 20px;
      text-align: center;
      border-radius: 8px 8px 0 0;
    }
    .header h1 {
      margin: 0;
      color: white;
      font-size: 24px;
    }
    .content {
      padding: 30px 20px;
      background-color: white;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #4267B2;
      color: white !important;
      text-decoration: none;
      border-radius: 6px;
      margin: 20px 0;
      font-weight: 600;
    }
    .footer {
      padding: 20px;
      text-align: center;
      background-color: #f0f2f5;
      border-radius: 0 0 8px 8px;
      font-size: 12px;
      color: #65676b;
    }
    .badge {
      background-color: #e4e6eb;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin: 10px 0;
    }
    hr {
      border: none;
      border-top: 1px solid #e4e6eb;
      margin: 20px 0;
    }
    @media only screen and (max-width: 600px) {
      .container {
        width: 100% !important;
      }
      .button {
        display: block !important;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SocialApp</h1>
    </div>
    
    <div class="content">
      {{content}}
    </div>
    
    <div class="footer">
      <p>You're receiving this because you're a SocialApp user.</p>
      <p>
        <a href="{{unsubscribeLink}}" style="color: #65676b; text-decoration: none;">Unsubscribe</a> | 
        <a href="https://socialapp.com/help" style="color: #65676b; text-decoration: none;">Help Center</a>
      </p>
      <p>&copy; 2025 SocialApp. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
