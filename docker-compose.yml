version: '3.8'
#: This version uses image: (pulls from ECR) instead of build: this is ECR docker version
services:
  # ====== BACKEND ======
  backend:
    image: 019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-backend:latest
    container_name: backend-main
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ====== EMAIL MICROSERVICE ======
  email-microservice:
    image: 019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-email:latest
    container_name: backend-email
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy

  # ====== ANALYTICS WORKER ======
  analytics-worker:
    image: 019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-analytics-worker:latest
    container_name: analytics-worker
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    command: node workers/analytics-worker.js

  # ====== FEED WORKER ======
  feed-worker:
    image: 019256649767.dkr.ecr.us-east-1.amazonaws.com/my-app-feed-worker:latest
    container_name: feed-worker
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    command: node workers/feed-worker.js

networks:
  app-network:
    driver: bridge